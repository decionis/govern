# Require a Decionis verdict before a tagged release ships. The signed verify
# URL is attached to the GitHub Release notes as portable proof that the
# release passed governance.

name: Release (governed)

on:
  push:
    tags: ["v*"]

jobs:
  govern-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release
    steps:
      - uses: actions/checkout@v4

      - name: Decionis verdict
        id: gate
        uses: decionis/govern@v1
        with:
          api-key: ${{ secrets.DECIONIS_API_KEY }}
          org-id: ${{ secrets.DECIONIS_ORG_ID }}
          workflow-key: release_gate
          fail-on: block
          payload: |
            {
              "release_tag": "${{ github.ref_name }}",
              "repository": "${{ github.repository }}"
            }

      - name: Create release (only if allowed)
        if: steps.gate.outputs.decision == 'allow'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Governed release. ${{ steps.gate.outputs.badge-markdown }}

          Verify: ${{ steps.gate.outputs.verify-url }}"
