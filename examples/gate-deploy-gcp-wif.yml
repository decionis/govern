# Tier 3b — OIDC federation (GCP Workload Identity Federation).
# The deploy obtains GCP credentials only by presenting a Decionis-issued OIDC
# token carrying decision=allow. GCP's own STS enforces the verdict via the
# provider's attribute-condition (assertion.decision == 'allow'); no workflow
# edit can mint credentials without a Decionis verdict.
#
# One-time GCP setup: see
# docs/architecture/execution-authority-tier3b-oidc-federation.md §3.

name: Deploy to GCP (governed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  govern-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      API: https://api.decionis.com
      AUD: //iam.googleapis.com/projects/PROJECT_NUM/locations/global/workloadIdentityPools/decionis/providers/gh
    steps:
      - uses: actions/checkout@v4

      - name: Decionis verdict + grant
        id: gate
        uses: decionis/govern@v1
        with:
          api-key: ${{ secrets.DECIONIS_API_KEY }}
          org-id: ${{ secrets.DECIONIS_ORG_ID }}
          workflow-key: github_deploy_approval
          action: production-deploy
          request-grant: true
          grant-audience: prod-gcp

      - name: Exchange grant for a GCP OIDC token
        if: steps.gate.outputs.decision == 'allow'
        id: oidc
        env:
          DECIONIS_API_KEY: ${{ secrets.DECIONIS_API_KEY }}
          GRANT: ${{ steps.gate.outputs.execution-grant }}
        run: |
          set -euo pipefail
          ID_TOKEN=$(curl -fsS -X POST "$API/v1/protocol/execution-grants/exchange-oidc" \
            -H "Authorization: Bearer $DECIONIS_API_KEY" \
            -H 'content-type: application/json' \
            -d "{\"execution_grant\":\"$GRANT\",\"cloud_audience\":\"$AUD\"}" \
            | jq -er '.id_token')
          echo "$ID_TOKEN" > "$RUNNER_TEMP/oidc_token"
          echo "token-file=$RUNNER_TEMP/oidc_token" >> "$GITHUB_OUTPUT"

      # The federated token now exchanges for GCP creds (auth action reads the
      # token file produced above). GCP rejects it unless decision == 'allow'.
      - name: Authenticate to GCP via WIF
        if: steps.gate.outputs.decision == 'allow'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/PROJECT_NUM/locations/global/workloadIdentityPools/decionis/providers/gh
          service_account: deploy@PROJECT.iam.gserviceaccount.com
          token_format: access_token
          # Use the Decionis-issued OIDC token instead of GitHub's:
          id_token_file: ${{ steps.oidc.outputs.token-file }}

      - name: Deploy
        if: steps.gate.outputs.decision == 'allow'
        run: ./scripts/deploy.sh
