# Azure federated credentials — the cloud issues credentials only for a
# Decionis-authorized deploy. The deploy presents a Decionis-issued OIDC token;
# Azure's federated credential matches it on issuer + subject + audience, and
# Decionis issues the token only on decision=allow.
#
# One-time Azure setup (federated credential on a user-assigned managed identity
# or app registration) — see
# docs/architecture/execution-authority-tier3b-oidc-federation.md §4:
#   az identity federated-credential create \
#     --name decionis-prod --identity-name deploy-mi --resource-group rg \
#     --issuer "https://api.decionis.com/v1/oidc/execution-grants" \
#     --subject "octo/repo@<sha-or-stable-subject>" \
#     --audiences "api://AzureADTokenExchange"

name: Deploy to Azure (governed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  govern-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      API: https://api.decionis.com
      AZURE_AUDIENCE: api://AzureADTokenExchange
    steps:
      - uses: actions/checkout@v4

      - name: Decionis verdict + grant
        id: gate
        uses: decionis/govern@v1
        with:
          api-key: ${{ secrets.DECIONIS_API_KEY }}
          org-id: ${{ secrets.DECIONIS_ORG_ID }}
          workflow-key: github_deploy_approval
          action: production-deploy
          request-grant: true
          grant-audience: prod-azure

      - name: Exchange grant for an Azure OIDC token, then login + deploy
        if: steps.gate.outputs.decision == 'allow'
        env:
          DECIONIS_API_KEY: ${{ secrets.DECIONIS_API_KEY }}
          GRANT: ${{ steps.gate.outputs.execution-grant }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          # Request the Decionis OIDC token (single-use, issued only on an authorized run).
          ID_TOKEN=$(curl -fsS -X POST "$API/v1/protocol/execution-grants/exchange-oidc" \
            -H "Authorization: Bearer $DECIONIS_API_KEY" \
            -H 'content-type: application/json' \
            -d "{\"execution_grant\":\"$GRANT\",\"cloud_audience\":\"$AZURE_AUDIENCE\"}" \
            | jq -er '.id_token')

          # Exchange it for Azure credentials via federated identity.
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --tenant "$AZURE_TENANT_ID" \
            --federated-token "$ID_TOKEN"

          ./scripts/deploy.sh
