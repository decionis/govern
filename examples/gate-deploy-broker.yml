# Tier 3 — credential broker. The deploy box holds NO standing credentials.
# Decionis mints a signed grant only on `allow`, and the deploy step exchanges
# that grant for the registry token at run time. Skip the gate → no grant →
# redeem returns nothing → deploy fails closed.
#
# One-time setup (org admin), registering the target's secret with Decionis:
#   curl -X POST "$API/v1/protocol/targets/credentials" \
#     -H "Authorization: Bearer $DECIONIS_API_KEY" -H 'content-type: application/json' \
#     -d '{"org_id":"<uuid>","audience":"prod-us-east","kind":"token","secret":"<registry-token>"}'

name: Deploy (brokered credentials)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  govern-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Decionis verdict + grant
        id: gate
        uses: decionis/govern@v1
        with:
          api-key: ${{ secrets.DECIONIS_API_KEY }}
          org-id: ${{ secrets.DECIONIS_ORG_ID }}
          workflow-key: github_deploy_approval
          action: production-deploy
          request-grant: true
          grant-audience: prod-us-east

      - name: Redeem grant for credentials, then deploy
        if: steps.gate.outputs.decision == 'allow'
        env:
          DECIONIS_API_KEY: ${{ secrets.DECIONIS_API_KEY }}
          GRANT: ${{ steps.gate.outputs.execution-grant }}
          API: https://api.decionis.com
        run: |
          set -euo pipefail
          # Exchange the single-use grant for the registry token. Fails closed
          # (non-zero) if the grant is missing, expired, or not authorized.
          CRED=$(curl -fsS -X POST "$API/v1/protocol/execution-grants/redeem" \
            -H "Authorization: Bearer $DECIONIS_API_KEY" \
            -H 'content-type: application/json' \
            -d "{\"execution_grant\":\"$GRANT\",\"audience\":\"prod-us-east\"}" \
            | jq -er '.credential')
          ./scripts/deploy.sh --registry-token "$CRED"
