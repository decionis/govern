# Enforce a production deploy with Decionis — the deploy runs THROUGH the gate.
#
# Because the deploy command is passed to `run:`, it cannot execute without an
# authorizing verdict. There is no `if:` to delete: on block/escalate the
# command never runs and the job fails. Drop into .github/workflows/.

name: Deploy (governed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  govern-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Govern + deploy
        uses: decionis/govern@v1
        with:
          api-key: ${{ secrets.DECIONIS_API_KEY }}
          org-id: ${{ secrets.DECIONIS_ORG_ID }}
          workflow-key: github_deploy_approval
          action: production-deploy
          mode: enforce
          payload: |
            {
              "environment": "production",
              "service": "api",
              "blast_radius": "high"
            }
          # Decionis runs this ONLY if it authorizes the deploy. On block or
          # escalate it never runs and the step fails — no skippable `if:`.
          run: ./scripts/deploy.sh
